<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0078ff;
      min-height: 100vh;
      color: #111827;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 28%),
                  radial-gradient(circle at bottom left, rgba(255,255,255,0.12), transparent 20%);
      pointer-events: none;
    }
    .page-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 16px;
      width: 100%;
    }
    .loginLogo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255,255,255,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 48px rgba(0,0,0,0.16);
      z-index: 20;
      padding: 4px;
    }
    .loginLogo img {
      display: block;
      width: 48px;
      height: auto;
    }
    .panel {
      width: 100%;
      max-width: 340px;
      margin: auto;
      display: grid;
      gap: 18px;
      justify-items: center;
    }
    .message-box {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 18px 20px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
      width: 100%;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    .loading-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px 28px;
      display: grid;
      gap: 16px;
      align-items: center;
      justify-items: center;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 24px 48px rgba(15,23,42,0.18);
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(29,78,216,0.2);
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-size: 16px;
      color: #111827;
      text-align: center;
      margin: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 48px rgba(15,23,42,0.12);
      width: 100%;
      max-width: 380px;
    }
    .login-card h2 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #111827;
      font-weight: 800;
    }
    .login-card p {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
    }
    .field-group {
      display: grid;
      gap: 12px;
    }
    label {
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      display: inline-block;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    input, select {
      width: 100%;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    input::placeholder {
      color: #9ca3af;
    }
    input:focus, select:focus {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(37,99,235,0.18);
    }
    .primary-btn {
      width: 100%;
      padding: 16px 18px;
      border: none;
      border-radius: 14px;
      background: #1d4ed8;
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }
    .primary-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37,99,235,0.28);
    }
    .secondary-link {
      text-align: center;
      display: block;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      text-decoration: none;
      margin-top: 12px;
      font-weight: 600;
    }
    .secondary-link:hover {
      text-decoration: underline;
    }
    .legend {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-top: 10px;
      text-align: left;
    }
    .logo-panel {
      display: none;
    }
    .logo-shield {
      position: relative;
      width: 320px;
      height: 380px;
      background: rgba(255,255,255,0.96);
      border-radius: 32px;
      display: grid;
      align-items: center;
      justify-items: center;
      padding: 28px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.18);
    }
    .logo-shield::before {
      content: '';
      position: absolute;
      top: -32px;
      width: 36px;
      height: 36px;
      background: white;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
    }
    .shield-mark {
      width: 220px;
      height: 260px;
      position: relative;
      display: grid;
      place-items: center;
    }
    .shield-mark::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: white;
      clip-path: polygon(50% 0%, 90% 18%, 100% 52%, 100% 80%, 50% 100%, 0% 80%, 0% 52%, 10% 18%);
      border: 10px solid #0078ff;
    }
    .shield-inner {
      width: 90%;
      height: 90%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    .shield-inner div {
      background: #0078ff;
    }
    .shield-inner div:nth-child(1) { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 0); }
    .shield-inner div:nth-child(2) { clip-path: polygon(0 0, 100% 0, 0 100%, 0 0); }
    .shield-inner div:nth-child(3) { clip-path: polygon(0 0, 100% 100%, 0 100%, 0 0); }
    .shield-inner div:nth-child(4) { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    .vertical-text {
      position: absolute;
      top: 30px;
      left: -56px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 20px;
      letter-spacing: 0.34em;
      color: white;
      font-weight: 900;
    }
    .vertical-right {
      position: absolute;
      top: 30px;
      right: -56px;
      writing-mode: vertical-rl;
      font-size: 20px;
      letter-spacing: 0.34em;
      color: white;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="loginLogo"><img src="img/sap_logo.svg" width="48" alt="SAP logo"></div>
    <section class="panel">
      <div class="message-box" id="errorBox" style="display:none;">
        Mandante, nombre o clave no son correctos. Repite los datos de acceso.
      </div>
      <div class="login-card">
        <h2>Acceder al sistema</h2>
        <p>Introduce tu usuario y contraseña para ingresar al portal académico.</p>
        <form id="loginForm">
          <div class="field-group">
            <label for="usuario" class="visually-hidden">Usuario</label>
            <input id="usuario" name="usuario" type="text" placeholder="Usuario" required autocomplete="username" />
          </div>
          <div class="field-group">
            <label for="password" class="visually-hidden">Clave de acceso</label>
            <input id="password" name="password" type="password" placeholder="Clave de acceso" required autocomplete="current-password" />
          </div>
          <div class="field-group">
            <label for="language">Idioma</label>
            <select id="language" name="language">
              <option value="es">ES - Español</option>
              <option value="en">EN - English</option>
            </select>
          </div>
          <button class="primary-btn" type="submit">Acceder al sistema</button>
          <p class="legend">Modificar clave acceso</p>
        </form>
      </div>
    </section>
    <section class="logo-panel">
      <div class="logo-shield">
        <div class="shield-mark">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="vertical-text">VERITAS</div>
        <div class="vertical-right">LIBERTATOS</div>
      </div>
    </section>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <p class="loading-text">Iniciando sesión...</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const loadingOverlay = document.getElementById('loadingOverlay');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errorBox.style.display = 'none';
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value.trim();

      if (usuario === '61457150' && password === 'pieroleandro112424') {
        loadingOverlay.style.display = 'flex';
        setTimeout(() => {
          window.location.href = 'resultados.html';
        }, 1800);
      } else {
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
